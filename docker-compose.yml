version: '3.8'
services:
  web:
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    # Run as root in dev so the container can create files inside the container filesystem
    user: "root"
    volumes:
      - .:/app:delegated
      # Keep .next in a Docker-managed volume to avoid host filesystem permission errors
      - next_cache:/app/.next
      # Keep node_modules in a Docker-managed volume to avoid host/container conflicts
      - node_modules:/app/node_modules
    command: npm run start

volumes:
  next_cache:
  node_modules:
